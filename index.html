<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>BeBo - Reti Sicurezza Assistenza</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;
            color: #1f2d3d;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .tagline {
            font-size: 20px;
            margin-bottom: 40px;
            color: #4a4a4a;
        }
        .section {
            margin: 40px 0;
        }
        .contact {
            font-size: 18px;
            line-height: 1.8;
        }
        .qr-section {
            margin: 40px 0;
        }
        .qr-section p {
            font-size: 15px;
            color: #555;
            margin-bottom: 16px;
        }
        #qrcode {
            display: inline-block;
            padding: 12px;
            border: 2px solid #1f2d3d;
            border-radius: 12px;
        }
        .footer {
            margin-top: 60px;
            font-size: 16px;
            color: #777;
        }
        a {
            color: #1f2d3d;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>BeBo</h1>
    <div class="tagline">Reti • Sicurezza • Assistenza</div>
    <div class="section">
        <p>Gestione reti Wi-Fi, sistemi di sicurezza e assistenza tecnica continuativa.</p>
        <p>Cortina d'Ampezzo – Venezia</p>
    </div>
    <div class="section contact">
        <p><strong>Telefono:</strong> <a href="tel:+393515008464">+39 351 500 8464</a></p>
        <p><strong>Email:</strong> <a href="mailto:info@be-bo.it">info@be-bo.it</a></p>
        <p><strong>Sito:</strong> <a href="https://www.be-bo.it">www.be-bo.it</a></p>
    </div>
    <div class="qr-section">
        <p>Scansiona per salvare il contatto</p>
        <div id="qrcode"></div>
    </div>
    <div class="footer">
        © 2026 BeBo
    </div>
</div>

<script>
    new QRCode(document.getElementById("qrcode"), {
        text: "BEGIN:VCARD\nVERSION:3.0\nFN:BeBo\nORG:BeBo\nTEL:+393515008464\nEMAIL:info@be-bo.it\nURL:https://www.be-bo.it\nADR:;;Cortina d'Ampezzo - Venezia;;;Italy\nEND:VCARD",
        width: 200,
        height: 200,
        colorDark: "#1f2d3d",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
</script>
</body>
</html>
